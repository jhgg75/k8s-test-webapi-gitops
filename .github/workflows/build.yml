name: Build & Push Image On Tag
on:
  push:
    tags:
      - 'v*'

jobs:
  build-push:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout full code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CI_PAT }}
          persist-credentials: true
          clean: true
          sparse-checkout-cone-mode: true
          fetch-tags: false
          show-progress: true
          lfs: false
          submodules: false
          set-safe-directory: true

      - name: Extract version tag
        run: |
          echo "RAW REF: $GITHUB_REF"
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Parsed Version: ${VERSION}"

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: ./K8sTest.WebApi
          push: true
          tags: liaoshuang/k8s-test-webapi:${{ env.VERSION }}

      - name: Auto update k8s yaml image tag
        run: |
          git config --global user.name "ci-bot"
          git config --global user.email "ci-bot@github.com"
          sed -i "s|image: .*k8s-test-webapi:.*|image: liaoshuang/k8s-test-webapi:${{ env.VERSION }}|g" k8s/deployment.yaml
          git add k8s/deployment.yaml
          if git diff --cached --quiet; then
            echo "No yaml changes, skip commit"
          else
            git commit -m "auto update image tag v${{ env.VERSION }}"
            git push origin HEAD:master
          fi
