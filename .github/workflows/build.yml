name: Build & Push Image On Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  build-push:
    runs-on: ubuntu-latest
    env:
      # 消除 Node20 弃用警告
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout full code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 必须先在仓库 Settings → Secrets and variables → Actions 中创建名为 CI_PAT 的 Secret
          # 该 Token 需要拥有 repo 权限（经典 Token）或对应仓库的读写权限（细粒度 Token）
          token: ${{ secrets.CI_PAT }}

      - name: Extract version tag
        run: |
          echo "RAW REF: $GITHUB_REF"
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Parsed Version: ${VERSION}"

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: ./K8sTest.WebApi
          push: true
          tags: liaoshuang/k8s-test-webapi:${{ env.VERSION }}

      - name: Auto update k8s yaml image tag
        run: |
          git config --global user.name "ci-bot"
          git config --global user.email "ci-bot@github.com"
          git fetch origin
          git checkout -B master origin/master
          sed -i "s|image: .*k8s-test-webapi:.*|image: liaoshuang/k8s-test-webapi:${{ env.VERSION }}|g" k8s/deployment.yaml
          git add k8s/deployment.yaml
          if git diff --cached --quiet; then
            echo "No yaml changes, skip commit"
          else
            git commit -m "auto update image tag v${{ env.VERSION }}"
            git push origin master
          fi
