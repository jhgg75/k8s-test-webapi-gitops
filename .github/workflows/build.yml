name: Build & Push Image On Tag

# 仅推送 v开头tag 触发
on:
  push:
    tags:
      - 'v*'

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 替换为拥有repo写入权限的PAT
          token: ${{ secrets.CI_PAT }}

      - name: Extract version tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: ./K8sTest.WebApi
          push: true
          tags: liaoshuang/k8s-test-webapi:${{ env.VERSION }}

      - name: Auto update k8s yaml image tag
        run: |
          git config --global user.name "ci-bot"
          git config --global user.email "ci-bot@github.com"
          git fetch origin
          # 拉取最新master，切换本地master分支
          git checkout -B master origin/master
          # 替换镜像tag
          sed -i "s|image: .*k8s-test-webapi:.*|image: liaoshuang/k8s-test-webapi:${{ env.VERSION }}|g" k8s/deployment.yaml
          git add k8s/deployment.yaml
          # 判断是否有修改
          if git diff --cached --quiet; then
            echo "No yaml changes, skip commit"
          else
            git commit -m "auto update image tag v${{ env.VERSION }}"
            git push origin master
          fi
